training:
  steps:
    - convert:
        binpack: official-stockfish/master-binpacks/fishpack32.binpack
        checkpoint2nnue:
          - --features=Full_Threats+HalfKAv2_hm^
          - --l1=1024
          - --l2=31
          - --ft_compression=leb128
        optimize:
          - --features=Full_Threats+HalfKAv2_hm^
          - --l1=1024
          - --l2=31
          - --ft_optimize_count=100000
          - --ft_optimize
          - --ft_compression=leb128
      run:
        binpacks:
          - official-stockfish/master-binpacks/fishpack32.binpack
        max_epochs: 3
        other_options:
          - --batch-size=8192
          - --epoch_size=100000
          - --features=Full_Threats+HalfKAv2_hm^
          - --l1=1024
          - --l2=31
          - --lr=4.375e-4
          - --gamma=0.995
          - --start-lambda=1.0
          - --end-lambda=0.75
          - --random-fen-skipping=10
          - --w1=3.3553547771220007
          - --w2=0.7006821612968052
          - --pc_y0=-0.20
          - --pc_y1=0.45
          - --pc_y2=1.0
          - --pc_y3=0.95
          - --pc_y4=0.75
          - --early_fen_skipping=10
          - --soft_early_fen_skipping=32
          - --ply_x1=0.0
          - --ply_y1=0.01
          - --ply_x2=14.0
          - --ply_y2=0.20
          - --ply_x3=18.5
          - --ply_y3=0.50
          - --ply_x4=29.5
          - --ply_y4=0.80
        resume: none
        repetitions: 2
      trainer:
        owner: vondele
        sha: f4dfde4964326198b1c6bd5a9971a5b426f8894b
    - <repeat_last>:
        run:
          resume: previous_model
          binpacks:
          - official-stockfish/master-binpacks/fishpack32.binpack
          other_options:
            - --lr=0.0010783148702050778
            - --gamma=0.994446435229841
            - --pow-exp=2.442037790427722
            - --qp-asymmetry=0.15795949371005746
            - --start-lambda=0.8460635942002347
            - --end-lambda=0.7490913625693039
            - --in-scaling=294.7193839807687
            - --out-scaling=352.8750799744594
            - --in-offset=281.4186220835457
            - --out-offset=279.93991915496105
            - --early-fen-skipping=18
            - --ply_x1=0.00
            - --ply_y1=0.025
            - --ply_x2=22.0
            - --ply_y2=0.05
            - --ply_x3=25.5
            - --ply_y3=0.20
            - --ply_x4=29.5
            - --ply_y4=0.80
