      owner: Disservin
      sha: 541aef889206882de4823cf5a676d53ac5171c6f
    options:
      hash: 16
      max_rounds: 80000
      tc: 10+0.1
    sprt:
      nElo_interval_midpoint: 1.5
      nElo_interval_width: 2
  reference:
    code:
      owner: official-stockfish
      sha: 5eeca7392ee90b7a43da69e647e3d596e42992fd
      target: profile-build
  steps: all
  testing:
    code:
      owner: official-stockfish
      sha: 5eeca7392ee90b7a43da69e647e3d596e42992fd
      target: profile-build
training:
  steps:
    - convert:
        binpack: official-stockfish/master-binpacks/fishpack32.binpack
        checkpoint2nnue:
          - --features=Full_Threats+HalfKAv2_hm^
          - --l1=1024
          - --l2=31
          - --ft_compression=leb128
        optimize:
          - --features=Full_Threats+HalfKAv2_hm^
          - --l1=1024
          - --l2=31
          - --ft_optimize_count=100000
          - --ft_optimize
          - --ft_compression=leb128
      run:
        binpacks:
          <insert_from_element(stage_one_binpacks)>
        max_epochs: 800
        other_options:
          - --optimizer-name=rangerlite
          - --swa-start-epoch=780
          - --batch-size=65536
          - --features=Full_Threats+HalfKAv2_hm^
          - --l1=1024
          - --l2=31
          - --lr=4.375e-4
          - --gamma=0.995
          - --start-lambda=1.0
          - --end-lambda=0.75
          - --random-fen-skipping=10
          - --early_fen_skipping=10
          - --soft_early_fen_skipping=32
          - --pc_y0=-0.25
          - --pc_y1=0.45
          - --pc_y2=1.0
          - --pc_y3=0.95
          - --pc_y4=0.75
          - --ply_x1=0.0
          - --ply_y1=0.01
          - --ply_x2=14.0
          - --ply_y2=0.20
          - --ply_x3=18.5
          - --ply_y3=0.50
          - --ply_x4=29.5
          - --ply_y4=0.80
        repetitions: 1
        resume: none
      trainer:
        owner: TonyCongqianWang
        sha: f022c69052a49b05f4467e989dcef7af30288082
    - <repeat_last>:
        run:
          resume: previous_model
          binpacks:
            <insert_from_element(stage_two_plus_binpacks)>
          other_options:
            - --lr=0.0010783148702050778
            - --gamma=0.994446435229841
            - --pow-exp=2.442037790427722
            - --qp-asymmetry=0.15795949371005746
            - --start-lambda=0.8460635942002347
            - --end-lambda=0.7490913625693039
            - --in-scaling=294.7193839807687
            - --out-scaling=352.8750799744594
            - --in-offset=281.4186220835457
            - --out-offset=279.93991915496105
            - --early-fen-skipping=28
            - --ply_x1=0.00
            - --ply_y1=0.025
            - --ply_x2=22.0
            - --ply_y2=0.05
            - --ply_x3=25.5
            - --ply_y3=0.20
            - --ply_x4=29.5
            - --ply_y4=0.80
    - <repeat_last>:
    - <repeat_last>:
        run:
          max_epochs: 55
          other_options:
            - --lr=1.5096062560119151e-05
            - --one-cycle-steps=20000
            - --one-cycle-final-div=1
            - --swa-start-epoch=15
            - --jitter_lambda_sample=0.001
            - --jitter_lambda_batch=0.007725100952719161
            - --start_lambda=0.7710037988696371
            - --end_lambda=0.7710037988696371
    - <repeat_last~1>:
        run:
          other_options:
            - --lr=0.00075
            - --gamma=0.9935974858411222
    - <repeat_last~1>:
    - <repeat_last~1>:
        run:
          other_options:
            - --lr=0.00040
            - --gamma=0.9935974858411222

