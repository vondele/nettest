# Training now reads a single local interleaved binpack on the mounted drive
# instead of the huggingface-hosted stockfish binpacks. Absolute paths are used
# as-is by the trainer and are skipped by the huggingface download step.
stage_one_binpacks: &stage_one_binpacks
  - /mnt/Array55T_remote/viren/interleaved-new-policy.binpack

stage_two_plus_binpacks: &stage_two_plus_binpacks
  - /mnt/Array55T_remote/viren/interleaved-new-policy.binpack

model_config: &model_config
  features: Full_Threats+HalfKAv2_hm^
  l1: 1024
  l2: 31

optimize_flags: &optimize_flags
  <<: *model_config
  ft-optimize-count: 100000
  ft-optimize: true
  ft-compression: leb128

checkpoint2nnue_options: &checkpoint2nnue_options
  <<: *model_config
  ft-compression: leb128

common_run_options: &common_run_options
  optimizer-name: rangerlite
  validation-size: 250000000
  check-val-every-n-epoch: 25
  batch-size: 65536
  <<: *model_config
  factorized-weight-decay: 0.001
  random-fen-skipping: 10
  early-fen-skipping: -18   # no hard opening cutoff
  soft-early-fen_skipping: 14   # soft early-ply ramp shifted 18 plies earlier (orig 32 - 18; ply-x* below also -18)
  pc-y0: -0.20
  pc-y1: 0.45
  pc-y2: 1.0
  pc-y3: 0.95
  pc-y4: 0.75

warmups_stage_options: &warmups_stage_options
  ply-x1: -18.0
  ply-y1: 0.01
  ply-x2: -4.0
  ply-y2: 0.20
  ply-x3: 0.5
  ply-y3: 0.50
  ply-x4: 11.5
  ply-y4: 0.80
  one-cycle-warmup-pct: 0.25
  one-cycle-final-div: "3e1"
  start-lambda: 1.0
  end-lambda: 1.0   # score-only (lambda=1 => target is purely the search score, no game result)

advanced_stage_options: &advanced_stage_options
  ply-x1: -18.0
  ply-y1: 0.025
  ply-x2: 4.0
  ply-y2: 0.05
  ply-x3: 7.5
  ply-y3: 0.20
  ply-x4: 11.5
  ply-y4: 0.80
  pow-exp: 2.435
  qp-asymmetry: 0.23
  in-scaling: 300.0
  out-scaling: 350.0
  in-offset: 300.0
  out-offset: 300.0
  one-cycle-warmup-pct: 0.033
  one-cycle-final-div: "2e3"
  jitter-lambda-sample: 0.0   # disabled: with lambda=1 the clamp would only pull it DOWN, reintroducing game result
  jitter-lambda-batch: 0.0
  jitter-decay-lambda-batch: 0.999
  start-lambda: 1.0   # score-only (lambda=1 => target is purely the search score, no game result)
  end-lambda: 1.0

# Trainer must include the montyformat (policy) data-loader changes so the
# interleaved-new-policy.binpack (Monty format, not Stockfish binpack) can be
# read. Those changes are applied locally at ~/sf_experiments/nnue-pytorch
# (branch monty-bt4-distill-data); commit + push them to the fork, then set the
# sha below to the pushed commit. See MONTYFORMAT.md for details.
trainer: &trainer
  owner: Viren6                          # github.com/Viren6/nnue-pytorch (with montyformat reader)
  sha: f63ea5d3ed54695b159c2dad8fcb2a7e5d48ecfb   # montyformat reader + Gini/capture/check filter

reference_code: &reference_code
  owner: official-stockfish
  sha: b1053e60b7e0fe3187006c4d7f38dbd22eaff763
  target: profile-build

testing_code: &testing_code
  <<: *reference_code

# --- Grouped Structure Anchors for Redundancy Reduction ---
common_convert: &common_convert
  binpack: official-stockfish/master-binpacks/fishpack32.binpack
  checkpoint2nnue: *checkpoint2nnue_options
  optimize: *optimize_flags

common_step: &common_step
  convert: *common_convert
  trainer: *trainer

common_run_stage_two_plus: &common_run_stage_two_plus
  binpacks: *stage_two_plus_binpacks
  repetitions: 1
  resume: previous_model

common_run_checkpoint: &common_run_checkpoint
  <<: *common_run_stage_two_plus
  resume: previous_checkpoint

# ----------------------------------------------------------

testing:
  crosscheck:
    trainer: *trainer
    binpack: official-stockfish/master-binpacks/fishpack32.binpack
    other_options:
      <<: *model_config
      count: 20000
  fastchess:
    code:
      owner: Disservin
      sha: b9008d08b9f375ef7810dc55da6ff223a3992cc2
    options:
      hash: 16
      max_rounds: 40000
      tc: 10+0.1
    sprt:
      nElo_interval_midpoint: 0
      nElo_interval_width: 2
  reference:
    code: *reference_code
  steps: last
  testing:
    code: *testing_code

training:
  steps:
    # Stage 1
    - <<: *common_step
      run:
        binpacks: *stage_one_binpacks
        max_epochs: 250
        other_options:
          <<: [*common_run_options, *warmups_stage_options]
          one-cycle-steps: 381500
          swa-start-epoch: 240
          lr: "1.5e-3"
        repetitions: 1
        resume: none

    # Stage 2
    - <<: *common_step
      run:
        <<: *common_run_stage_two_plus
        max_epochs: 950
        other_options:
          <<: [*common_run_options, *advanced_stage_options]
          one-cycle-steps: 1373400
          lr: "1.3e-3"
          swa-start-epoch: 900

    # Stage 3
    - <<: *common_step
      run:
        <<: *common_run_stage_two_plus
        max_epochs: 3000
        repetitions: 3
        other_options:
          <<: [*common_run_options, *advanced_stage_options]
          one-cycle-steps: 4578000
          lr: "0.65e-3"
