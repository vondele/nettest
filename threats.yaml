  testing:
    code:
      owner: official-stockfish
      sha: ed651aab544a330a9c8ae0dc2d8d51d5d48a8112
      target: profile-build
training:
  steps:
    - convert:
        binpack: official-stockfish/master-binpacks/fishpack32.binpack
        checkpoint2nnue:
          - --features=Full_Threats+HalfKAv2_hm^
          - --l1=1024
          - --l2=31
          - --ft_compression=leb128
        optimize:
          - --features=Full_Threats+HalfKAv2_hm^
          - --l1=1024
          - --l2=31
          - --ft_optimize_count=100000
          - --ft_optimize
          - --ft_compression=leb128
      run:
        repetitions: 1
        resume: none
        binpacks:
          <insert_from_element(stage_two_plus_binpacks)>
        max_epochs: 300
        other_options:
          - --optimizer-name=rangerlite
          - --validation-size=250000000
          - --check_val_every_n_epoch=25
          - --batch-size=65536
          - --features=Full_Threats+HalfKAv2_hm^
          - --l1=1024
          - --l2=31
          - --pow-exp=2.442037790427722
          - --qp-asymmetry=0.15795949371005746
          - --in-scaling=294.7193839807687
          - --out-scaling=352.8750799744594
          - --in-offset=280.0
          - --out-offset=280.0
          - --early-fen-skipping=10
          - --soft_early_fen_skipping=32
          - --ply_x1=0.00
          - --ply_y1=0.00
          - --ply_x2=22.0
          - --ply_y2=0.03
          - --ply_x3=26.0
          - --ply_y3=0.25
          - --ply_x4=29.5
          - --ply_y4=0.80
          - --lr=1.5e-3
          - --one-cycle-warmup-pct=0.4
          - --one-cycle-steps=381500
          - --one-cycle-final-div=1e3
          - --jitter-lambda-sample=0.001
          - --swa-start-epoch=250
          - --jitter-lambda-batch=0.0120
          - --jitter-decay-lambda-batch=0.999
          - --start-lambda=0.76
          - --end-lambda=0.76
          - --random-fen-skipping=10
          - --pc_y0=-0.20
          - --pc_y1=0.45
          - --pc_y2=1.0
          - --pc_y3=0.95
          - --pc_y4=0.75
      trainer:
        owner: TonyCongqianWang
        sha: 2d42a723e6cff821f99f69dcdda8b0b6219fc9b5
    - <repeat_last>:
        run:
          resume: previous_model
          max_epochs: 550
          other_options:
            - --lr=1e-3
            - --one-cycle-warmup-pct=0.05
            - --one-cycle-steps=763000
            - --swa-start-epoch=500
    - <repeat_last>:
        run:
          max_epochs: 1050
          other_options:
            - --lr=0.67e-3
            - --one-cycle-steps=1526000
            - --swa-start-epoch=1000
    - <repeat_last>:
        run:
          max_epochs: 1000
          other_options:
            - --lr=0.5e-3
            - --one-cycle-steps=3052000
            - --swa-start-epoch=2000
    - <repeat_last>:
        run:
          resume: previous_checkpoint
          max_epochs: 1500
          other_options:
            - --jitter-decay-lambda-batch=0.99
    - <repeat_last>:
        run:
          max_epochs: 2050
          other_options:
            - --jitter-decay-lambda-batch=0.90


