# --- Grouped structure anchors ---
common_convert: &common_convert
  binpack: official-stockfish/master-binpacks/fishpack32.binpack
  checkpoint2nnue: *checkpoint2nnue_options
  optimize: *optimize_flags

common_step: &common_step
  convert: *common_convert
  trainer: *common_trainer

common_run_stage_two_plus: &common_run_stage_two_plus
  binpacks: *stage_two_plus_binpacks
  repetitions: 1
  resume: previous_model

common_run_checkpoint: &common_run_checkpoint
  <<: *common_run_stage_two_plus
  resume: previous_checkpoint

official_code: &official_code
  owner: official-stockfish
  sha: ed651aab544a330a9c8ae0dc2d8d51d5d48a8112
  target: profile-build

# --- Anchors end ---
# ----------------------------------------------------------

testing:
  crosscheck:
    trainer: *common_trainer
    binpack: official-stockfish/master-binpacks/fishpack32.binpack
    options:
      - --features=Full_Threats+HalfKAv2_hm^
      - --l1=1024
      - --l2=31
      - --count=5000
  fastchess:
    code:
      owner: Disservin
      sha: 541aef889206882de4823cf5a676d53ac5171c6f
    options:
      hash: 16
      max_rounds: 50000
      tc: 10+0.1
  reference:
    code: *official_code
  steps: all
  testing:
    code: *official_code

training:
  steps:
    # Stage 1
    - <<: *common_step
      run:
        binpacks: *stage_one_binpacks
        max_epochs: 250
        other_options:
          - *common_run_options
          - --one-cycle-steps=381500
          - --lr=2e-3
          - --start-lambda=1.0
          - --end-lambda=0.75
          - --ply_x1=0.0
          - --ply_y1=0.01
          - --ply_x2=14.0
          - --ply_y2=0.20
          - --ply_x3=18.5
          - --ply_y3=0.50
          - --ply_x4=29.5
          - --ply_y4=0.80
        repetitions: 1
        resume: none

    # Stage 2
    - <<: *common_step
      run:
        <<: *common_run_stage_two_plus
        max_epochs: 300
        other_options:
          - *common_run_options
          - --one-cycle-steps=381500
          - --lr=1.5e-3
          - *advanced_stage_options
          - --swa-start-epoch=250

    # Stage 3
    - <<: *common_step
      run:
        <<: *common_run_stage_two_plus
        max_epochs: 550
        other_options:
          - *common_run_options
          - --one-cycle-steps=763000
          - --lr=1e-3
          - *advanced_stage_options
          - --swa-start-epoch=500

    # Stage 4
    - <<: *common_step
      run:
        <<: *common_run_stage_two_plus
        max_epochs: 1050
        other_options:
          - *common_run_options
          - --one-cycle-steps=1526000
          - --lr=0.67e-3
          - *advanced_stage_options
          - --swa-start-epoch=1000

    # Stage 5
    - <<: *common_step
      run:
        <<: *common_run_stage_two_plus
        max_epochs: 1000
        other_options:
          - *common_run_options
          - --one-cycle-steps=3052000
          - --lr=0.5e-3
          - *advanced_stage_options
          - --swa-start-epoch=2000

    # Stage 6
    - <<: *common_step
      run:
        <<: *common_run_checkpoint
        max_epochs: 1500
        other_options:
          - *common_run_options
          - --one-cycle-steps=3052000
          - --lr=0.5e-3
          - *advanced_stage_options
          - --swa-start-epoch=2000

    # Stage 7
    - <<: *common_step
      run:
        <<: *common_run_checkpoint
        max_epochs: 2050
        other_options:
          - *common_run_options
          - --one-cycle-steps=3052000
          - --lr=0.5e-3
          - *advanced_stage_options
          - --swa-start-epoch=2000
